name: Build and Deploy Spring Boot to GKE

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot Application
        run: mvn clean package

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/springboot-repo/spring-boot-hello-world:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/springboot-repo/spring-boot-hello-world:${{ github.sha }}

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials \
          ${{ secrets.GKE_CLUSTER }} \
          --zone ${{ secrets.GKE_ZONE }} \
          --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/springboot-app \
          springboot-app=asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/springboot-repo/spring-boot-hello-world:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/springboot-app

      - name: Verify Deployment
        run: |
          kubectl get deployments

      - name: Verify Pods
        run: |
          kubectl get pods

      - name: Verify Services
        run: |
          kubectl get services