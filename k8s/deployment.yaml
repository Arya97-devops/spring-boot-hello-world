apiVersion: apps/v1

kind: Deployment

metadata:
  name: springboot-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot-app

  template:
    metadata:
      labels:
        app: springboot-app

    spec:
      containers:
      - name: springboot-app
        image: asia-south1-docker.pkg.dev/springboot-gke-demo-503112/springboot-repo/spring-boot-hello-world:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 8080